<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#081426">
<title>2026世界杯观赛中心</title>
<meta name="description" content="2026世界杯观赛中心：查看世界杯赛程、比分、小组积分、今日比赛、倒计时和收藏赛事。">
<meta property="og:title" content="2026世界杯观赛中心">
<meta property="og:description" content="赛程、比分、小组积分、今日比赛和收藏赛事一站查看。">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
:root{
    color-scheme:dark;
    --background:#081426;
    --surface:#111f34;
    --surface-light:#172941;
    --border:#29405d;
    --text:#f8fafc;
    --muted:#9fb0c5;
    --gold:#f6c453;
    --green:#22c55e;
    --red:#fb7185;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-width:320px;
    background:
        radial-gradient(circle at 50% -10%, rgba(34,197,94,.16), transparent 32rem),
        var(--background);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}

button{
    font:inherit;
}

header{
    position:relative;
    overflow:hidden;
    padding:32px 20px;
    text-align:center;
    border-bottom:1px solid var(--border);
    background:rgba(8,20,38,.86);
}

header::after{
    content:"";
    position:absolute;
    inset:auto 15% 0;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

h1{
    margin:0;
    font-size:clamp(26px,4vw,42px);
    letter-spacing:.02em;
}

.subtitle{
    margin:10px 0 0;
    color:var(--muted);
    font-size:14px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:24px 20px 48px;
}

.card{
    padding:24px;
    margin-bottom:24px;
    border:1px solid rgba(41,64,93,.8);
    border-radius:18px;
    background:rgba(17,31,52,.94);
    box-shadow:0 20px 45px rgba(0,0,0,.14);
}

.section-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin-bottom:18px;
}

h2{
    margin:0;
    font-size:22px;
}

.section-note{
    margin:5px 0 0;
    color:var(--muted);
    font-size:13px;
}

.overview-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr 1fr;
    gap:14px;
    margin-bottom:24px;
}

.overview-card{
    min-height:132px;
    padding:20px;
    border:1px solid var(--border);
    border-radius:16px;
    background:linear-gradient(145deg,rgba(23,41,65,.95),rgba(11,26,45,.9));
}

.overview-card.primary{
    border-color:rgba(246,196,83,.55);
    background:
        radial-gradient(circle at 100% 0,rgba(246,196,83,.16),transparent 55%),
        linear-gradient(145deg,rgba(23,41,65,.98),rgba(11,26,45,.94));
}

.overview-label{
    color:var(--muted);
    font-size:13px;
}

.overview-value{
    margin-top:12px;
    color:var(--text);
    font-size:21px;
    font-weight:800;
}

.overview-card.primary .overview-value{
    color:var(--gold);
    font-size:25px;
}

.overview-meta{
    margin-top:8px;
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
}

.toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
}

.team-filter{
    min-width:190px;
    padding:9px 34px 9px 12px;
    color:var(--text);
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--surface-light);
}

.refresh-button{
    padding:9px 13px;
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:10px;
    background:transparent;
    cursor:pointer;
}

.refresh-button:hover{
    color:var(--gold);
    border-color:var(--gold);
}

.tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:2px 0 8px;
    scrollbar-width:none;
}

.tabs::-webkit-scrollbar{
    display:none;
}

.tab{
    flex:0 0 auto;
    padding:8px 14px;
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:999px;
    background:transparent;
    cursor:pointer;
    transition:.2s ease;
}

.tab:hover,
.tab.active{
    color:#081426;
    border-color:var(--gold);
    background:var(--gold);
}

.loading,
.empty{
    padding:36px 20px;
    color:var(--muted);
    text-align:center;
}

.matches-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
}

.knockout-overview{
    display:grid;
    grid-template-columns:repeat(6,minmax(120px,1fr));
    gap:10px;
    margin-bottom:18px;
}

.knockout-step{
    padding:12px;
    border:1px solid var(--border);
    border-radius:12px;
    background:rgba(23,41,65,.62);
}

.knockout-step.active{
    border-color:rgba(246,196,83,.7);
    background:rgba(246,196,83,.08);
}

.knockout-step-title{
    color:var(--text);
    font-weight:800;
}

.knockout-step-meta{
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
}

.knockout-tree-wrap{
    position:relative;
    margin-bottom:20px;
    padding:18px;
    overflow-x:auto;
    border:1px solid rgba(246,196,83,.22);
    border-radius:18px;
    background:
        radial-gradient(circle at center, rgba(246,196,83,.16), transparent 28%),
        linear-gradient(145deg,rgba(15,23,42,.88),rgba(17,31,52,.7));
}

.knockout-tree{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns:170px 150px 140px 130px 190px 130px 140px 150px 170px;
    gap:18px;
    min-width:1380px;
    min-height:760px;
    align-items:stretch;
}

.knockout-lines{
    position:absolute;
    inset:18px;
    z-index:0;
    min-width:1380px;
    height:760px;
    pointer-events:none;
}

.knockout-lines path{
    fill:none;
    stroke:rgba(246,196,83,.28);
    stroke-width:2;
}

.tree-column{
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    gap:12px;
}

.tree-column-title{
    position:absolute;
    top:0;
    transform:translateY(-8px);
    color:rgba(226,232,240,.72);
    font-size:11px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
}

.tree-column.left .tree-column-title{
    left:0;
}

.tree-column.right .tree-column-title{
    right:0;
}

.bracket-node{
    position:relative;
    z-index:2;
    padding:10px;
    border:1px solid var(--border);
    border-radius:14px;
    background:rgba(17,31,52,.94);
    box-shadow:0 16px 36px rgba(0,0,0,.18);
}

.bracket-node.next{
    border-color:rgba(246,196,83,.72);
    box-shadow:0 0 0 1px rgba(246,196,83,.12) inset,0 16px 36px rgba(0,0,0,.2);
}

.bracket-node-label{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin-bottom:8px;
    color:var(--muted);
    font-size:11px;
}

.bracket-team{
    display:grid;
    grid-template-columns:20px minmax(0,1fr) auto;
    align-items:center;
    gap:7px;
    padding:5px 0;
}

.bracket-team img,
.bracket-team-fallback{
    width:20px;
    height:20px;
    object-fit:contain;
}

.bracket-team-fallback{
    display:grid;
    place-items:center;
    border-radius:50%;
    color:var(--muted);
    background:rgba(148,163,184,.12);
    font-size:11px;
}

.bracket-team-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:12px;
    font-weight:800;
}

.bracket-score{
    color:var(--gold);
    font-weight:900;
}

.bracket-time{
    margin-top:6px;
    color:var(--muted);
    font-size:11px;
    text-align:center;
}

.champion-node{
    display:grid;
    place-items:center;
    align-self:center;
    min-height:210px;
    padding:22px;
    border:1px solid rgba(246,196,83,.56);
    border-radius:24px;
    background:
        radial-gradient(circle at top,rgba(246,196,83,.24),transparent 52%),
        rgba(17,31,52,.96);
    text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.3);
}

.champion-kicker{
    color:var(--gold);
    font-size:12px;
    font-weight:900;
    letter-spacing:.18em;
}

.champion-logo{
    display:grid;
    place-items:center;
    width:68px;
    height:68px;
    margin:14px auto 10px;
}

.champion-logo img{
    width:68px;
    height:68px;
    object-fit:contain;
}

.champion-fallback{
    display:grid;
    place-items:center;
    width:68px;
    height:68px;
    border-radius:50%;
    background:rgba(246,196,83,.15);
    color:var(--gold);
    font-size:30px;
}

.champion-name{
    font-size:22px;
    font-weight:950;
}

.champion-meta{
    margin-top:8px;
    color:var(--muted);
    font-size:12px;
    line-height:1.6;
}

.third-place-note{
    position:absolute;
    left:50%;
    bottom:18px;
    z-index:3;
    transform:translateX(-50%);
    min-width:280px;
    padding:10px 14px;
    border:1px dashed rgba(148,163,184,.34);
    border-radius:999px;
    color:var(--muted);
    background:rgba(15,23,42,.9);
    font-size:12px;
    text-align:center;
}

.knockout-board{
    display:grid;
    grid-template-columns:repeat(6,minmax(220px,1fr));
    gap:14px;
    overflow-x:auto;
    padding-bottom:8px;
}

.knockout-column{
    min-width:220px;
}

.knockout-column-title{
    position:sticky;
    top:0;
    z-index:1;
    padding:8px 0;
    color:var(--gold);
    font-weight:800;
    background:rgba(17,31,52,.94);
}

.knockout-list{
    display:grid;
    gap:10px;
}

.knockout-match{
    padding:12px;
    border:1px solid var(--border);
    border-radius:12px;
    background:linear-gradient(145deg,var(--surface-light),rgba(17,31,52,.78));
}

.knockout-match.next{
    border-color:rgba(246,196,83,.68);
    box-shadow:0 0 0 1px rgba(246,196,83,.1) inset;
}

.knockout-match-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:10px;
    color:var(--muted);
    font-size:12px;
}

.knockout-team{
    display:grid;
    grid-template-columns:24px minmax(0,1fr) auto;
    align-items:center;
    gap:8px;
    padding:7px 0;
}

.knockout-team img,
.knockout-team-fallback{
    width:24px;
    height:24px;
    object-fit:contain;
}

.knockout-team-fallback{
    display:grid;
    place-items:center;
    color:var(--muted);
    border-radius:50%;
    background:rgba(148,163,184,.12);
    font-size:12px;
}

.knockout-team-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-weight:700;
}

.knockout-score{
    color:var(--gold);
    font-weight:800;
}

.knockout-time{
    margin-top:8px;
    color:var(--muted);
    font-size:12px;
    text-align:center;
}

.match{
    position:relative;
    padding:18px;
    border:1px solid var(--border);
    border-radius:14px;
    background:linear-gradient(145deg,var(--surface-light),rgba(17,31,52,.78));
}

.favorite-button{
    position:absolute;
    z-index:1;
    top:50px;
    right:14px;
    width:34px;
    height:34px;
    padding:0;
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:50%;
    background:rgba(8,20,38,.72);
    cursor:pointer;
}

.favorite-button:hover,
.favorite-button.active{
    color:var(--gold);
    border-color:var(--gold);
}

.match-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:15px;
    color:var(--muted);
    font-size:12px;
}

.status{
    padding:4px 8px;
    border-radius:999px;
    background:rgba(148,163,184,.12);
}

.status.live{
    color:#04130a;
    background:var(--green);
}

.status.finished{
    color:#d8e2ee;
    background:#334155;
}

.match-actions{
    display:flex;
    justify-content:center;
    margin-top:12px;
}

.detail-toggle{
    padding:7px 12px;
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:999px;
    background:rgba(8,20,38,.35);
    cursor:pointer;
}

.detail-toggle:hover{
    color:var(--gold);
    border-color:var(--gold);
}

.match-details{
    display:none;
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--border);
}

.match.expanded .match-details{
    display:block;
}

.detail-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
}

.detail-item{
    padding:10px;
    border:1px solid rgba(41,64,93,.72);
    border-radius:10px;
    background:rgba(8,20,38,.28);
}

.detail-label{
    margin-bottom:4px;
    color:var(--muted);
    font-size:12px;
}

.detail-value{
    color:var(--text);
    font-size:13px;
    line-height:1.45;
}

.cache-note{
    display:block;
    margin-top:10px;
    color:var(--gold);
    font-size:12px;
}

.odds-panel{
    margin-top:14px;
    padding:12px;
    border:1px solid rgba(246,196,83,.38);
    border-radius:12px;
    background:rgba(246,196,83,.06);
}

.odds-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
    color:var(--gold);
    font-weight:800;
}

.odds-status{
    color:var(--muted);
    font-size:12px;
    font-weight:500;
}

.odds-row{
    display:grid;
    grid-template-columns:1.2fr repeat(3, minmax(0, .8fr));
    gap:8px;
    padding:9px 0;
    border-top:1px solid rgba(41,64,93,.7);
    align-items:center;
}

.odds-head{
    color:var(--muted);
    font-size:12px;
}

.odds-price{
    color:var(--text);
    font-weight:800;
}

.odds-disclaimer{
    margin-top:10px;
    color:var(--muted);
    font-size:12px;
    line-height:1.5;
}

.teams{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
    align-items:center;
    gap:12px;
}

.team{
    min-width:0;
    text-align:center;
}

.team img,
.team-fallback{
    width:48px;
    height:48px;
    margin:0 auto 8px;
    object-fit:contain;
}

.team-fallback{
    display:grid;
    place-items:center;
    color:var(--gold);
    border-radius:50%;
    background:rgba(246,196,83,.12);
    font-weight:700;
}

.team-name{
    overflow:hidden;
    color:var(--text);
    font-weight:650;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.score{
    min-width:76px;
    color:var(--gold);
    font-size:26px;
    font-weight:800;
    text-align:center;
}

.score.upcoming{
    color:var(--muted);
    font-size:15px;
    font-weight:600;
}

.standings-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:650px;
    border-collapse:collapse;
}

th,td{
    padding:12px 10px;
    border-bottom:1px solid var(--border);
    text-align:center;
}

th{
    color:var(--muted);
    font-size:12px;
    font-weight:600;
}

th:nth-child(2),
td:nth-child(2){
    text-align:left;
}

tbody tr:hover{
    background:rgba(255,255,255,.025);
}

.rank{
    color:var(--muted);
    font-weight:700;
}

.rank.qualify{
    color:var(--green);
}

.standing-team{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:150px;
    font-weight:650;
}

.standing-team img{
    width:28px;
    height:28px;
    object-fit:contain;
}

.points{
    color:var(--gold);
    font-size:17px;
    font-weight:800;
}

.guide-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:12px;
}

.guide-item{
    padding:16px;
    border:1px solid var(--border);
    border-radius:12px;
    background:rgba(23,41,65,.65);
}

.guide-value{
    margin-bottom:5px;
    color:var(--gold);
    font-size:20px;
    font-weight:800;
}

.guide-label{
    color:var(--muted);
    font-size:13px;
}

@media(max-width:760px){
    header{
        padding:25px 16px;
    }

    h1{
        font-size:24px;
        white-space:nowrap;
    }

    .subtitle{
        font-size:12px;
    }

    .container{
        padding:16px 12px 32px;
    }

    .card{
        padding:17px 14px;
        margin-bottom:16px;
        border-radius:15px;
    }

    .section-head{
        display:block;
    }

    .overview-grid{
        grid-template-columns:1fr;
        gap:10px;
        margin-bottom:16px;
    }

    .overview-card{
        min-height:auto;
        padding:16px;
    }

    .toolbar{
        align-items:stretch;
        flex-direction:column;
    }

    .team-filter{
        width:100%;
    }

    h2{
        font-size:19px;
    }

    .tabs{
        margin-top:14px;
    }

    .matches-grid{
        grid-template-columns:1fr;
    }

    .knockout-overview{
        grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .knockout-tree-wrap{
        padding:14px;
    }

    .knockout-tree{
        grid-template-columns:160px 145px 135px 125px 180px 125px 135px 145px 160px;
        gap:14px;
        min-width:1260px;
    }

    .knockout-lines{
        inset:14px;
        min-width:1260px;
    }

    .knockout-board{
        grid-template-columns:repeat(6,260px);
    }

    .match{
        padding:15px 12px;
    }

    .team img,
    .team-fallback{
        width:42px;
        height:42px;
    }

    .team-name{
        font-size:14px;
    }

    .score{
        min-width:62px;
        font-size:23px;
    }

    .detail-grid{
        grid-template-columns:1fr;
    }

    .odds-row{
        grid-template-columns:1fr repeat(3, minmax(0, .7fr));
        font-size:12px;
    }

    .guide-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
    }
}

@media(max-width:360px){
    h1{
        font-size:21px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🏆 2026 世界杯观赛中心</h1>
    <p class="subtitle">赛程、比分与小组积分一站查看 · 时间均为北京时间</p>
</header>

<main class="container">

    <section class="overview-grid" aria-label="今日观赛概览">
        <div class="overview-card primary">
            <div class="overview-label">⏱ 下一场比赛</div>
            <div class="overview-value" id="next-match">正在计算...</div>
            <div class="overview-meta" id="next-match-meta">获取赛程数据中</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">📅 今日比赛</div>
            <div class="overview-value" id="today-count">--</div>
            <div class="overview-meta" id="today-meta">北京时间</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">⭐ 我的收藏</div>
            <div class="overview-value" id="favorite-count">0 场</div>
            <div class="overview-meta" id="update-time">等待首次更新</div>
        </div>
    </section>

    <section class="card">
        <div class="section-head">
            <div>
                <h2>🏟️ 淘汰赛对阵</h2>
                <p class="section-note" id="knockout-summary">球队席位确定后会自动更新晋级路线</p>
            </div>
        </div>
        <div id="knockout" class="loading">正在加载淘汰赛...</div>
    </section>

    <section class="card">
        <div class="section-head">
            <div>
                <h2>📅 世界杯赛程</h2>

<script>
const TEAM_NAMES = {

    "Scotland":"苏格兰",
    "Senegal":"塞内加尔",
    "South Africa":"南非",
    "South Korea":"韩国",
    "Spain":"西班牙",
    "Sweden":"瑞典",
    "Switzerland":"瑞士",
    "Tunisia":"突尼斯",
    "Turkey":"土耳其",
    "United States":"美国",
    "Uruguay":"乌拉圭",
    "Uzbekistan":"乌兹别克斯坦"
};

const GROUP_NAMES = {
    "Group A":"A组",
    "Group B":"B组",
    "Group C":"C组",
    "Group D":"D组",
    "Group E":"E组",
    "Group F":"F组",
    "Group G":"G组",
    "Group H":"H组",
    "Group I":"I组",
    "Group J":"J组",
    "Group K":"K组",
    "Group L":"L组"
};

const LIVE_STATUSES = new Set(["IN_PLAY","PAUSED","EXTRA_TIME","PENALTY_SHOOTOUT"]);
const UPCOMING_STATUSES = new Set(["SCHEDULED","TIMED"]);
const KNOCKOUT_STAGES = [
    "LAST_32",
    "LAST_16",
    "QUARTER_FINALS",
    "SEMI_FINALS",
    "THIRD_PLACE",
    "FINAL"
];
const CACHE_KEYS = {
    matches:"worldcup-cache-matches-v1",
    standings:"worldcup-cache-standings-v1"
};
let allMatches = [];
let allStandings = [];
let activeMatchFilter = "all";
let activeGroup = 0;
let selectedTeam = "";
let matchesInitialized = false;
let countdownTimer;
let refreshTimer;
let favoriteMatches = loadFavorites();

function loadFavorites(){
    try{
        return new Set(JSON.parse(localStorage.getItem("worldcup-favorites") || "[]"));
    }catch(error){
        return new Set();
    }
}

function escapeHtml(value){
    return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function teamName(team){
    return TEAM_NAMES[team?.name] || team?.shortName || team?.name || "待定";
}

function groupName(group){
    if(!group) return "淘汰赛";
    if(GROUP_NAMES[group]) return GROUP_NAMES[group];
    return group.replace("GROUP_","") + "组";
}

function formatDate(date){
    return new Intl.DateTimeFormat("zh-CN",{
        timeZone:"Asia/Shanghai",
        month:"numeric",
        day:"numeric",
        weekday:"short",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
    }).format(new Date(date));
}

function formatFullDate(date){
    return new Intl.DateTimeFormat("zh-CN",{
        timeZone:"Asia/Shanghai",
        year:"numeric",
        month:"numeric",
        day:"numeric",
        weekday:"short",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
    }).format(new Date(date));
}

function formatUpdatedDate(date){
    if(!date) return "暂无";
    return new Intl.DateTimeFormat("zh-CN",{
        timeZone:"Asia/Shanghai",
        month:"numeric",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        hour12:false
    }).format(new Date(date));
}

function shanghaiDateKey(date){
    const parts = new Intl.DateTimeFormat("en-CA",{
        timeZone:"Asia/Shanghai",
        year:"numeric",
        month:"2-digit",
        day:"2-digit"
    }).formatToParts(new Date(date));
    const values = Object.fromEntries(parts.map(part=>[part.type,part.value]));
    return `${values.year}-${values.month}-${values.day}`;
}

function isToday(match){
    return shanghaiDateKey(match.utcDate) === shanghaiDateKey(new Date());
}

function countdownText(date){
    const difference = new Date(date) - new Date();
    if(difference <= 0) return "即将开赛";

    const totalMinutes = Math.floor(difference / 60000);
    const days = Math.floor(totalMinutes / 1440);
    const hours = Math.floor((totalMinutes % 1440) / 60);
    const minutes = totalMinutes % 60;

    if(days > 0) return `${days}天 ${hours}小时`;
    if(hours > 0) return `${hours}小时 ${minutes}分`;
    return `${Math.max(1,minutes)}分钟`;
}

function statusInfo(match){
    if(LIVE_STATUSES.has(match.status)){
        return { text:"进行中", className:"live", type:"live" };
    }

    if(match.status === "FINISHED"){
        return { text:"已结束", className:"finished", type:"finished" };
    }

    if(match.status === "POSTPONED"){
        return { text:"已延期", className:"finished", type:"other" };
    }

    return { text:"未开始", className:"", type:"upcoming" };
}

function teamLogo(team){
    const name = escapeHtml(teamName(team));

    if(team?.crest){
        return `<img src="${escapeHtml(team.crest)}" alt="${name}队徽" loading="lazy" onerror="this.outerHTML='<div class=&quot;team-fallback&quot;>⚽</div>'">`;
    }

    return `<div class="team-fallback">⚽</div>`;
}

function compactTeamLogo(team){
    const name = escapeHtml(teamName(team));

    if(team?.crest){
        return `<img src="${escapeHtml(team.crest)}" alt="${name}队徽" loading="lazy">`;
    }

    return `<div class="knockout-team-fallback">?</div>`;
}

function bracketTeamLogo(team){
    const name = escapeHtml(teamName(team));

    if(team?.crest){
        return `<img src="${escapeHtml(team.crest)}" alt="${name}队徽" loading="lazy">`;
    }

    return `<div class="bracket-team-fallback">?</div>`;
}

function championLogo(team){
    const name = escapeHtml(teamName(team));

    if(team?.crest){
        return `<img src="${escapeHtml(team.crest)}" alt="${name}队徽" loading="lazy">`;
    }

    return `<div class="champion-fallback">🏆</div>`;
}

function scoreText(scorePart){
    const home = scorePart?.home;
    const away = scorePart?.away;
    if(home === null || home === undefined || away === null || away === undefined){
        return "暂无";
    }
    return `${home} - ${away}`;
}

function winnerText(winner){
    const labels = {
        HOME_TEAM:"主队胜",
        AWAY_TEAM:"客队胜",
        DRAW:"平局"
    };
    return labels[winner] || "未定";
}

function refereeText(referees){
    const referee = referees?.find(item=>item.type === "REFEREE") || referees?.[0];
    if(!referee) return "暂无";
    return referee.nationality ? `${referee.name}（${referee.nationality}）` : referee.name;
}

function stageText(stage){
    const labels = {
        GROUP_STAGE:"小组赛",
        LAST_32:"32强",
        LAST_16:"16强",
        QUARTER_FINALS:"四分之一决赛",
        SEMI_FINALS:"半决赛",
        THIRD_PLACE:"季军赛",
        FINAL:"决赛"
    };
    return labels[stage] || stage || "暂无";
}

function knockoutStageShort(stage){
    const labels = {
        LAST_32:"32强",
        LAST_16:"16强",
        QUARTER_FINALS:"1/4决赛",
        SEMI_FINALS:"半决赛",
        THIRD_PLACE:"三四名",
        FINAL:"决赛"
    };
    return labels[stage] || stageText(stage);
}

function matchWinnerTeam(match){
    if(match?.score?.winner === "HOME_TEAM") return match.homeTeam;
    if(match?.score?.winner === "AWAY_TEAM") return match.awayTeam;
    return null;
}

function cacheRead(key){
    try{
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
    }catch(error){
        return null;
    }
}

function cacheWrite(key,data){
    try{
        localStorage.setItem(key,JSON.stringify({
            savedAt:new Date().toISOString(),
            data
        }));
    }catch(error){
        // 浏览器禁用本地存储时忽略缓存失败。
    }
}

function cacheNote(cached){
    if(!cached?.savedAt) return "";
    return `<span class="cache-note">正在显示上次成功加载的数据：${escapeHtml(formatUpdatedDate(cached.savedAt))}</span>`;
}

function renderMatchDetails(match){
    return `
        <div class="match-details">
            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-label">完整时间</div>
                    <div class="detail-value">${escapeHtml(formatFullDate(match.utcDate))}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">赛事阶段</div>
                    <div class="detail-value">${escapeHtml(stageText(match.stage))} · ${escapeHtml(groupName(match.group))}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">半场比分</div>
                    <div class="detail-value">${escapeHtml(scoreText(match.score?.halfTime))}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">全场结果</div>
                    <div class="detail-value">${escapeHtml(winnerText(match.score?.winner))}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">主裁判</div>
                    <div class="detail-value">${escapeHtml(refereeText(match.referees))}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">数据更新</div>
                    <div class="detail-value">${escapeHtml(formatUpdatedDate(match.lastUpdated))}</div>
                </div>
            </div>
            <div class="odds-panel" id="odds-${escapeHtml(match.id)}" data-odds-state="idle">
                <div class="odds-title">
                    <span>赛前赔率</span>
                    <span class="odds-status">展开后加载</span>
                </div>
                <div class="odds-disclaimer">赔率仅供赛事信息参考，不构成投注建议。</div>
            </div>
        </div>
    `;
}

function renderOddsMessage(matchId,message){
    const panel = document.getElementById(`odds-${matchId}`);
    if(!panel) return;

    panel.dataset.oddsState = "done";
    panel.innerHTML = `
        <div class="odds-title">
            <span>赛前赔率</span>
            <span class="odds-status">暂无数据</span>
        </div>
        <div class="odds-disclaimer">${escapeHtml(message)}<br>赔率仅供赛事信息参考，不构成投注建议。</div>
    `;
}

function renderOddsData(matchId,data){
    const panel = document.getElementById(`odds-${matchId}`);
    if(!panel) return;

    if(data.status !== "available" || !data.bookmakers?.length){
        const messages = {
            not_configured:"赔率 API 尚未配置。配置 ODDS_API_KEY 后可自动尝试加载。",
            not_found:"当前比赛暂无可匹配赔率。",
            provider_error:"赔率服务暂时不可用。"
        };
        renderOddsMessage(matchId,messages[data.status] || "暂无赔率数据。");
        return;
    }

    const rows = data.bookmakers.map(bookmaker=>`
        <div class="odds-row">
            <div>
                <div class="odds-price">${escapeHtml(bookmaker.name)}</div>
                <div class="odds-head">${escapeHtml(formatUpdatedDate(bookmaker.lastUpdate))}</div>
            </div>
            <div class="odds-price">${escapeHtml(bookmaker.odds.home ?? "-")}</div>
            <div class="odds-price">${escapeHtml(bookmaker.odds.draw ?? "-")}</div>
            <div class="odds-price">${escapeHtml(bookmaker.odds.away ?? "-")}</div>
        </div>
    `).join("");

    panel.dataset.oddsState = "done";
    panel.innerHTML = `
        <div class="odds-title">
            <span>赛前赔率</span>
            <span class="odds-status">${escapeHtml(data.provider || "赔率服务")}</span>
        </div>
        <div class="odds-row odds-head">
            <div>博彩公司</div>
            <div>主胜</div>
            <div>平局</div>
            <div>客胜</div>
        </div>
        ${rows}
        <div class="odds-disclaimer">${escapeHtml(data.disclaimer || "赔率仅供赛事信息参考，不构成投注建议。")}</div>
    `;
}

async function loadOdds(matchId){
    const panel = document.getElementById(`odds-${matchId}`);
    if(!panel || panel.dataset.oddsState === "loading" || panel.dataset.oddsState === "done") return;

    panel.dataset.oddsState = "loading";
    panel.querySelector(".odds-status").textContent = "加载中...";

    try{
        const response = await fetch(`/api/odds?matchId=${encodeURIComponent(matchId)}`);
        const data = await response.json();
        renderOddsData(matchId,data);
    }catch(error){
        renderOddsMessage(matchId,"赔率加载失败，请稍后重试。");
    }
}

function renderMatch(match){
    const status = statusInfo(match);
    const homeScore = match.score?.fullTime?.home;
    const awayScore = match.score?.fullTime?.away;
    const hasScore = homeScore !== null && homeScore !== undefined &&
        awayScore !== null && awayScore !== undefined;
    const score = hasScore
        ? `${homeScore} - ${awayScore}`
        : `<span class="score upcoming">VS</span>`;

    return `
        <article class="match" data-match-id="${escapeHtml(match.id)}">
            <button class="favorite-button ${favoriteMatches.has(String(match.id)) ? "active" : ""}"
                data-favorite="${escapeHtml(match.id)}"
                aria-label="${favoriteMatches.has(String(match.id)) ? "取消收藏" : "收藏比赛"}"
                title="${favoriteMatches.has(String(match.id)) ? "取消收藏" : "收藏比赛"}">
                ${favoriteMatches.has(String(match.id)) ? "★" : "☆"}
            </button>
            <div class="match-top">
                <span>${escapeHtml(groupName(match.group))} · 第${escapeHtml(match.matchday || "-")}轮</span>
                <span class="status ${status.className}">${status.text}</span>
            </div>
            <div class="teams">
                <div class="team">
                    ${teamLogo(match.homeTeam)}
                    <div class="team-name" title="${escapeHtml(teamName(match.homeTeam))}">${escapeHtml(teamName(match.homeTeam))}</div>
                </div>
                <div>
                    <div class="score">${score}</div>
                </div>
                <div class="team">
                    ${teamLogo(match.awayTeam)}
                    <div class="team-name" title="${escapeHtml(teamName(match.awayTeam))}">${escapeHtml(teamName(match.awayTeam))}</div>
                </div>
            </div>
            <div class="match-top" style="margin:15px 0 0;justify-content:center">
                <span>${escapeHtml(formatDate(match.utcDate))}</span>
            </div>
            <div class="match-actions">
                <button class="detail-toggle" data-detail="${escapeHtml(match.id)}">展开详情</button>
            </div>
            ${renderMatchDetails(match)}
        </article>
    `;
}

function renderMatches(){
    const matchesElement = document.getElementById("matches");
    let filtered = allMatches.filter(match=>{
        const type = statusInfo(match).type;
        const matchesStatus =
            activeMatchFilter === "all" ||
            activeMatchFilter === type ||
            (activeMatchFilter === "today" && isToday(match)) ||
            (activeMatchFilter === "favorites" && favoriteMatches.has(String(match.id)));
        const matchesTeam = !selectedTeam ||
            match.homeTeam?.name === selectedTeam ||
            match.awayTeam?.name === selectedTeam;
        return matchesStatus && matchesTeam;
    });

    filtered = filtered
        .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate))
        .slice(0,activeMatchFilter === "all" ? 20 : 40);

    const labels = {
        all:"全部比赛",
        today:"今日比赛",
        live:"正在进行",
        upcoming:"即将开始",
        finished:"已结束",
        favorites:"已收藏"
    };

    document.getElementById("match-summary").textContent =
        `${labels[activeMatchFilter]}${selectedTeam ? ` · ${teamName({name:selectedTeam})}` : ""} · 共 ${filtered.length} 场${activeMatchFilter === "all" ? "（显示前20场）" : ""}`;

    matchesElement.className = "";
    matchesElement.innerHTML = filtered.length
        ? `<div class="matches-grid">${filtered.map(renderMatch).join("")}</div>`
        : `<div class="empty">当前没有符合条件的赛事</div>`;

    document.getElementById("favorite-count").textContent = `${favoriteMatches.size} 场`;
}

function renderOverview(){
    const now = new Date();
    const todayMatches = allMatches.filter(isToday);
    const liveMatches = allMatches.filter(match=>statusInfo(match).type === "live");
    const nextMatch = allMatches
        .filter(match=>UPCOMING_STATUSES.has(match.status) && new Date(match.utcDate) > now)
        .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate))[0];

    document.getElementById("today-count").textContent = `${todayMatches.length} 场`;
    document.getElementById("today-meta").textContent = liveMatches.length
        ? `${liveMatches.length} 场正在进行`
        : todayMatches.length ? "查看今日完整赛程" : "今日暂无比赛";

    if(nextMatch){
        document.getElementById("next-match").textContent =
            `${teamName(nextMatch.homeTeam)} vs ${teamName(nextMatch.awayTeam)}`;
        document.getElementById("next-match-meta").textContent =
            `${formatDate(nextMatch.utcDate)} · 距开赛 ${countdownText(nextMatch.utcDate)}`;
    }else{
        document.getElementById("next-match").textContent = "本届赛事已结束";
        document.getElementById("next-match-meta").textContent = "感谢关注";
    }
}

function renderTeamFilter(){
    const teams = [...new Set(
        allMatches.flatMap(match=>[match.homeTeam?.name,match.awayTeam?.name]).filter(Boolean)
    )].sort((a,b)=>teamName({name:a}).localeCompare(teamName({name:b}),"zh-CN"));

    document.getElementById("team-filter").innerHTML =
        '<option value="">全部球队</option>' +
        teams.map(name=>`<option value="${escapeHtml(name)}">${escapeHtml(teamName({name}))}</option>`).join("");
}

function renderKnockoutTeam(team,score){
    return `
        <div class="knockout-team">
            ${compactTeamLogo(team)}
            <div class="knockout-team-name" title="${escapeHtml(teamName(team))}">${escapeHtml(teamName(team))}</div>
            <div class="knockout-score">${score === null || score === undefined ? "-" : escapeHtml(score)}</div>
        </div>
    `;
}

function renderKnockoutMatch(match,nextMatchId){
    const status = statusInfo(match);
    const homeScore = match.score?.fullTime?.home;
    const awayScore = match.score?.fullTime?.away;

    return `
        <article class="knockout-match ${String(match.id) === String(nextMatchId) ? "next" : ""}">
            <div class="knockout-match-top">
                <span>#${escapeHtml(match.id)}</span>
                <span class="status ${status.className}">${status.text}</span>
            </div>
            ${renderKnockoutTeam(match.homeTeam,homeScore)}
            ${renderKnockoutTeam(match.awayTeam,awayScore)}
            <div class="knockout-time">${escapeHtml(formatDate(match.utcDate))}</div>
        </article>
    `;
}

function renderBracketTeam(team,score){
    return `
        <div class="bracket-team">
            ${bracketTeamLogo(team)}
            <div class="bracket-team-name" title="${escapeHtml(teamName(team))}">${escapeHtml(teamName(team))}</div>
            <div class="bracket-score">${score === null || score === undefined ? "-" : escapeHtml(score)}</div>
        </div>
    `;
}

function renderBracketNode(match,nextMatchId){
    if(!match){
        return `
            <article class="bracket-node">
                <div class="bracket-node-label">
                    <span>席位待定</span>
                    <span>未开始</span>
                </div>
                ${renderBracketTeam(null,null)}
                ${renderBracketTeam(null,null)}
                <div class="bracket-time">等待上轮结果</div>
            </article>
        `;
    }

    const status = statusInfo(match);
    const homeScore = match.score?.fullTime?.home;
    const awayScore = match.score?.fullTime?.away;

    return `
        <article class="bracket-node ${String(match.id) === String(nextMatchId) ? "next" : ""}">
            <div class="bracket-node-label">
                <span>${escapeHtml(knockoutStageShort(match.stage))}</span>
                <span class="status ${status.className}">${status.text}</span>
            </div>
            ${renderBracketTeam(match.homeTeam,homeScore)}
            ${renderBracketTeam(match.awayTeam,awayScore)}
            <div class="bracket-time">${escapeHtml(formatDate(match.utcDate))}</div>
        </article>
    `;
}

function renderTreeColumn(stage,matches,side,nextMatchId){
    const slots = {
        LAST_32:8,
        LAST_16:4,
        QUARTER_FINALS:2,
        SEMI_FINALS:1
    }[stage] || matches.length;
    const items = Array.from({length:slots},(_,index)=>matches[index] || null);

    return `
        <div class="tree-column ${side}">
            <div class="tree-column-title">${escapeHtml(knockoutStageShort(stage))}</div>
            ${items.map(match=>renderBracketNode(match,nextMatchId)).join("")}
        </div>
    `;
}

function renderBracketLines(){
    const left = [
        [[115,56],[205,102]], [[115,148],[205,102]],
        [[115,240],[205,286]], [[115,332],[205,286]],
        [[115,424],[205,470]], [[115,516],[205,470]],
        [[115,608],[205,654]], [[115,700],[205,654]],
        [[275,102],[362,194]], [[275,286],[362,194]],
        [[275,470],[362,562]], [[275,654],[362,562]],
        [[430,194],[500,378]], [[430,562],[500,378]]
    ];
    const right = left.map(([from,to])=>[
        [1000 - from[0],from[1]],
        [1000 - to[0],to[1]]
    ]);

    return [...left,...right].map(([from,to])=>{
        const mid = (from[0] + to[0]) / 2;
        return `<path d="M ${from[0]} ${from[1]} H ${mid} V ${to[1]} H ${to[0]}"></path>`;
    }).join("");
}

function renderChampionNode(finalMatch){
    const champion = matchWinnerTeam(finalMatch);
    const finalStatus = finalMatch ? statusInfo(finalMatch) : null;
    const championName = champion ? teamName(champion) : "冠军待定";
    const finalMeta = finalMatch
        ? `${formatDate(finalMatch.utcDate)} · ${finalStatus.text}`
        : "等待半决赛胜者会师决赛";

    return `
        <div class="champion-node" aria-label="最终晋级队伍">
            <div>
                <div class="champion-kicker">FINAL WINNER</div>
                <div class="champion-logo">${championLogo(champion)}</div>
                <div class="champion-name">${escapeHtml(championName)}</div>
                <div class="champion-meta">
                    <div>最终晋级队伍</div>
                    <div>${escapeHtml(finalMeta)}</div>
                </div>
            </div>
        </div>
    `;
}

function renderKnockoutTree(matchesByStage,nextMatch){
    const left = stage=>matchesByStage[stage].slice(0,Math.ceil(matchesByStage[stage].length / 2));
    const right = stage=>matchesByStage[stage].slice(Math.ceil(matchesByStage[stage].length / 2));
    const finalMatch = matchesByStage.FINAL[0];
    const thirdPlaceMatch = matchesByStage.THIRD_PLACE[0];
    const thirdPlaceText = thirdPlaceMatch
        ? `三四名决赛：${formatDate(thirdPlaceMatch.utcDate)} · ${teamName(thirdPlaceMatch.homeTeam)} vs ${teamName(thirdPlaceMatch.awayTeam)}`
        : "三四名决赛：等待半决赛结果";

    return `
        <div class="knockout-tree-wrap">
            <svg class="knockout-lines" viewBox="0 0 1000 760" preserveAspectRatio="none" aria-hidden="true">
                ${renderBracketLines()}
            </svg>
            <div class="knockout-tree" aria-label="淘汰赛连线图">
                ${renderTreeColumn("LAST_32",left("LAST_32"),"left",nextMatch?.id)}
                ${renderTreeColumn("LAST_16",left("LAST_16"),"left",nextMatch?.id)}
                ${renderTreeColumn("QUARTER_FINALS",left("QUARTER_FINALS"),"left",nextMatch?.id)}
                ${renderTreeColumn("SEMI_FINALS",left("SEMI_FINALS"),"left",nextMatch?.id)}
                ${renderChampionNode(finalMatch)}
                ${renderTreeColumn("SEMI_FINALS",right("SEMI_FINALS"),"right",nextMatch?.id)}
                ${renderTreeColumn("QUARTER_FINALS",right("QUARTER_FINALS"),"right",nextMatch?.id)}
                ${renderTreeColumn("LAST_16",right("LAST_16"),"right",nextMatch?.id)}
                ${renderTreeColumn("LAST_32",right("LAST_32"),"right",nextMatch?.id)}
            </div>
            <div class="third-place-note">${escapeHtml(thirdPlaceText)}</div>
        </div>
    `;
}

function renderKnockout(){
    const knockoutElement = document.getElementById("knockout");
    const knockoutMatches = allMatches
        .filter(match=>KNOCKOUT_STAGES.includes(match.stage))
        .sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate));

    if(!knockoutMatches.length){
        knockoutElement.className = "empty";
        knockoutElement.textContent = "暂无淘汰赛数据";
        return;
    }

    const now = new Date();
    const nextMatch = knockoutMatches.find(match=>
        UPCOMING_STATUSES.has(match.status) && new Date(match.utcDate) > now
    );
    const currentStage = nextMatch?.stage || knockoutMatches.find(match=>statusInfo(match).type !== "finished")?.stage || "FINAL";
    const overview = KNOCKOUT_STAGES.map(stage=>{
        const matches = knockoutMatches.filter(match=>match.stage === stage);
        const finished = matches.filter(match=>match.status === "FINISHED").length;
        return `
            <div class="knockout-step ${stage === currentStage ? "active" : ""}">
                <div class="knockout-step-title">${escapeHtml(knockoutStageShort(stage))}</div>
                <div class="knockout-step-meta">${finished}/${matches.length} 场完成</div>
            </div>
        `;
    }).join("");

    const matchesByStage = Object.fromEntries(
        KNOCKOUT_STAGES.map(stage=>[
            stage,
            knockoutMatches.filter(match=>match.stage === stage)
        ])
    );

    const board = KNOCKOUT_STAGES.map(stage=>{
        const matches = matchesByStage[stage];
        return `
            <div class="knockout-column">
                <div class="knockout-column-title">${escapeHtml(knockoutStageShort(stage))}</div>
                <div class="knockout-list">
                    ${matches.map(match=>renderKnockoutMatch(match,nextMatch?.id)).join("")}
                </div>
            </div>
        `;
    }).join("");

    const decided = knockoutMatches.filter(match=>match.homeTeam?.name && match.awayTeam?.name).length;
    document.getElementById("knockout-summary").textContent =
        `共 ${knockoutMatches.length} 场 · 已确定 ${decided} 场对阵${nextMatch ? ` · 下一场 ${formatDate(nextMatch.utcDate)}` : ""}`;

    knockoutElement.className = "";
    knockoutElement.innerHTML = `
        <div class="knockout-overview">${overview}</div>
        ${renderKnockoutTree(matchesByStage,nextMatch)}
        <div class="knockout-board" aria-label="淘汰赛晋级路线">${board}</div>
    `;
}

function updateTimestamp(){
    document.getElementById("update-time").textContent =
        `最后更新 ${new Intl.DateTimeFormat("zh-CN",{
            timeZone:"Asia/Shanghai",
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit",
            hour12:false
        }).format(new Date())}`;
}

function saveFavorites(){
    localStorage.setItem("worldcup-favorites",JSON.stringify([...favoriteMatches]));
}

function scheduleRefresh(){
    clearTimeout(refreshTimer);
    const hasLiveMatch = allMatches.some(match=>statusInfo(match).type === "live");
    refreshTimer = setTimeout(()=>{
        if(document.visibilityState === "visible"){
            Promise.all([loadMatches(),loadStandings()]);
        }else{
            scheduleRefresh();
        }
    },hasLiveMatch ? 60000 : 300000);
}

function renderStandings(){
    const standingsElement = document.getElementById("standings");
    const group = allStandings[activeGroup];

    if(!group){
        standingsElement.className = "empty";
        standingsElement.textContent = "暂无积分榜数据";
        return;
    }

    const rows = group.table.map(entry=>`
        <tr>
            <td class="rank ${entry.position <= 2 ? "qualify" : ""}">${entry.position}</td>
            <td>
                <div class="standing-team">
                    ${entry.team?.crest ? `<img src="${escapeHtml(entry.team.crest)}" alt="" loading="lazy">` : ""}
                    <span>${escapeHtml(teamName(entry.team))}</span>
                </div>
            </td>
            <td>${entry.playedGames}</td>
            <td>${entry.won}</td>
            <td>${entry.draw}</td>
            <td>${entry.lost}</td>
            <td>${entry.goalDifference > 0 ? "+" : ""}${entry.goalDifference}</td>
            <td class="points">${entry.points}</td>
        </tr>
    `).join("");

    standingsElement.className = "standings-wrap";
    standingsElement.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>排名</th>
                    <th>球队</th>
                    <th>赛</th>
                    <th>胜</th>
                    <th>平</th>
                    <th>负</th>
                    <th>净胜球</th>
                    <th>积分</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

function renderGroupTabs(){
    const tabs = document.getElementById("group-tabs");
    tabs.innerHTML = allStandings.map((group,index)=>`
        <button class="tab ${index === activeGroup ? "active" : ""}" data-group="${index}">
            ${escapeHtml(groupName(group.group))}
        </button>
    `).join("");
}

async function loadMatches(){
    try{
        document.getElementById("refresh-button").disabled = true;
        const response = await fetch("/api/matches");
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        cacheWrite(CACHE_KEYS.matches,data);
        allMatches = data.matches || [];

        if(!matchesInitialized){
            if(allMatches.some(match=>statusInfo(match).type === "live")){
                activeMatchFilter = "live";
            }else if(allMatches.some(isToday)){
                activeMatchFilter = "today";
            }else if(allMatches.some(match=>statusInfo(match).type === "upcoming")){
                activeMatchFilter = "upcoming";
            }
            renderTeamFilter();
            matchesInitialized = true;
        }

        document.querySelectorAll("#match-tabs .tab").forEach(tab=>{
            tab.classList.toggle("active",tab.dataset.filter === activeMatchFilter);
        });
        renderOverview();
        renderKnockout();
        renderMatches();
        updateTimestamp();
        scheduleRefresh();

        clearInterval(countdownTimer);
        countdownTimer = setInterval(renderOverview,30000);
    }catch(error){
        const cached = cacheRead(CACHE_KEYS.matches);
        if(cached?.data?.matches?.length){
            allMatches = cached.data.matches;
            if(!matchesInitialized){
                renderTeamFilter();
                matchesInitialized = true;
            }
            renderOverview();
            renderKnockout();
            renderMatches();
            document.getElementById("match-summary").insertAdjacentHTML("beforeend",cacheNote(cached));
        }else{
            document.getElementById("matches").innerHTML =
                '<div class="empty">暂时无法获取赛程，请稍后刷新重试</div>';
            document.getElementById("match-summary").textContent = "数据加载失败";
        }
    }finally{
        document.getElementById("refresh-button").disabled = false;
    }
}

async function loadStandings(){
    try{
        const response = await fetch("/api/standings");
        if(!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        cacheWrite(CACHE_KEYS.standings,data);
        allStandings = data.standings || [];
        renderGroupTabs();
        renderStandings();
    }catch(error){
        const cached = cacheRead(CACHE_KEYS.standings);
        if(cached?.data?.standings?.length){
            allStandings = cached.data.standings;
            renderGroupTabs();
            renderStandings();
            document.getElementById("standings").insertAdjacentHTML("beforebegin",cacheNote(cached));
        }else{
            document.getElementById("standings").innerHTML =
                '<div class="empty">暂时无法获取积分榜，请稍后刷新重试</div>';
        }
    }
}

document.getElementById("match-tabs").addEventListener("click",event=>{
    const button = event.target.closest("[data-filter]");
    if(!button) return;

    activeMatchFilter = button.dataset.filter;
    document.querySelectorAll("#match-tabs .tab").forEach(tab=>{
        tab.classList.toggle("active",tab === button);
    });
    renderMatches();
});

document.getElementById("matches").addEventListener("click",event=>{
    const detailButton = event.target.closest("[data-detail]");
    if(detailButton){
        const card = detailButton.closest(".match");
        const expanded = card.classList.toggle("expanded");
        detailButton.textContent = expanded ? "收起详情" : "展开详情";
        if(expanded){
            loadOdds(detailButton.dataset.detail);
        }
        return;
    }

    const button = event.target.closest("[data-favorite]");
    if(!button) return;

    const matchId = button.dataset.favorite;
    if(favoriteMatches.has(matchId)){
        favoriteMatches.delete(matchId);
    }else{
        favoriteMatches.add(matchId);
    }
    saveFavorites();
    renderMatches();
});

document.getElementById("team-filter").addEventListener("change",event=>{
    selectedTeam = event.target.value;
    renderMatches();
});

document.getElementById("refresh-button").addEventListener("click",()=>{
    Promise.all([loadMatches(),loadStandings()]);
});

document.getElementById("group-tabs").addEventListener("click",event=>{
    const button = event.target.closest("[data-group]");
    if(!button) return;

    activeGroup = Number(button.dataset.group);
    renderGroupTabs();
    renderStandings();
});

loadMatches();
loadStandings();
</script>

</body>
</html>
